function getLang() {

}
function setLang(lang) {
  try { localStorage.setItem('sbkimlang', lang); } catch (e) {}
  render(lang);
}
function render(lang) {
  if (!LANGS[lang]) lang = 'de';
  const L = LANGS[lang];
  document.documentElement.lang = lang;
  document.title = L.title + ' — Jasons-Tresor';
  document.getElementById('content').innerHTML =

    '<div class="section"><h2>' + L.imp_h  + '</h2>' + L.imp  + '</div>' +

    '<div class="section"><h2>' + L.priv_h + '</h2>' + L.priv + '</div>';
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
}
function buildBar() {
  const bar = document.getElementById('langBar');
  Object.keys(LABELS).forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.dataset.lang = l;
    btn.textContent = LABELS[l];
    btn.onclick = () => setLang(l);
    bar.appendChild(btn);
  });
}
